<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0"/>
      <stop offset="100%" style="stop-color:#1e88e5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- 3x3 grid of rounded squares representing AAC tiles -->
  <g fill="white" opacity="0.95">
    <rect x="72" y="72" width="104" height="104" rx="16"/>
    <rect x="204" y="72" width="104" height="104" rx="16"/>
    <rect x="336" y="72" width="104" height="104" rx="16"/>
    <rect x="72" y="204" width="104" height="104" rx="16"/>
    <rect x="204" y="204" width="104" height="104" rx="16"/>
    <rect x="336" y="204" width="104" height="104" rx="16"/>
    <rect x="72" y="336" width="104" height="104" rx="16"/>
    <rect x="204" y="336" width="104" height="104" rx="16"/>
    <rect x="336" y="336" width="104" height="104" rx="16"/>
  </g>
  <!-- Speech bubble indicator on top-right tile -->
  <g fill="#FFF176">
    <circle cx="388" cy="124" r="18"/>
    <polygon points="380,138 388,156 396,138"/>
  </g>
</svg>
